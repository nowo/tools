# 构建静态站点并部署到 GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署,不取消进行中的部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # 读 package.json 的 packageManager 字段

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate static site
        run: pnpm generate
        env:
          # GitHub Pages 项目站点部署在 /<仓库名>/ 子路径下;绑定自定义域名则改为 /
          NUXT_APP_BASE_URL: /tools/

      - uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public # Nuxt 4 generate 产物目录(旧的 ./dist 已失效)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
